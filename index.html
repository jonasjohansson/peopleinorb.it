<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>People in Orbit</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="scene" id="scene">
      <img
        src="assets/pio.jpg"
        alt="People in Orbit"
        class="bg-image"
        id="bgImage"
      />
      <img
        src="assets/pio-dusk.jpg"
        alt=""
        class="bg-image bg-image--dusk"
        id="bgImageDusk"
      />

      <!-- Post-processing FX canvas -->
      <canvas class="fx-canvas" id="fxCanvas"></canvas>

      <!-- Hotspot layer — positioned to match the image exactly -->
      <div class="hotspot-layer" id="hotspotLayer">

        <!-- Turntable — plays music -->
        <button
          class="hotspot hotspot--turntable"
          id="turntableBtn"
          aria-label="Play music"
          title="Play music"
        >
          <span class="hotspot-icon">&#9654;</span>
        </button>

        <!-- Music notes container -->
        <div class="music-notes" id="musicNotes" aria-hidden="true"></div>

        <!-- Blue Vinyl Record — purchase link -->
        <a
          href="https://aprilrecords.se"
          target="_blank"
          rel="noopener"
          class="hotspot hotspot--vinyl"
          id="vinylBtn"
          aria-label="Buy on April Records"
          title="Buy on April Records"
        >
          <span class="hotspot-icon">&#128179;</span>
        </a>

        <!-- TV Screen — video player -->
        <button
          class="hotspot hotspot--tv"
          id="tvBtn"
          aria-label="Watch video"
          title="Watch video"
        >
          <span class="hotspot-icon">&#9654;</span>
        </button>

        <!-- TV video container -->
        <div class="tv-screen" id="tvScreen">
          <div class="tv-static" id="tvStatic">
            <canvas id="staticCanvas"></canvas>
          </div>
        </div>

        <!-- Warm Lamp — toggle dark/light -->
        <button
          class="hotspot hotspot--lamp"
          id="lampBtn"
          aria-label="Toggle lights"
          title="Toggle lights"
        >
          <span class="hotspot-icon">&#128161;</span>
        </button>

        <!-- Speaker pulse overlays -->
        <div class="speaker speaker--left" id="speakerLeft"></div>
        <div class="speaker speaker--right" id="speakerRight"></div>

        <!-- Easter egg: Book spine -->
        <div class="hotspot hotspot--book" id="bookEgg" aria-label="Secret">
          <span class="tooltip">You found a secret! 🪐</span>
        </div>
      </div>

      <!-- Spotify floating player (fixed position, outside layer) -->
      <div class="spotify-player" id="spotifyPlayer">
        <iframe
          id="spotifyFrame"
          src=""
          width="300"
          height="80"
          frameborder="0"
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy"
        ></iframe>
        <button class="spotify-close" id="spotifyClose" aria-label="Close player">&times;</button>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
